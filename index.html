<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Titration Final Project</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <script>
      AFRAME.registerComponent('drag-rotate', {
        schema: { speed: { default: 1 } },
        init: function () {
          this.ifMouseDown = false;
          this.x_cord = 0;
          this.y_cord = 0;
          document.addEventListener('touchstart', this.OnDocumentTouchStart.bind(this));
          document.addEventListener('touchend', this.OnDocumentTouchEnd.bind(this));
          document.addEventListener('touchmove', this.OnDocumentTouchMove.bind(this));
        },
        OnDocumentTouchStart: function (event) { 
            this.ifMouseDown = true; 
            this.x_cord = event.touches[0].clientX; 
            this.y_cord = event.touches[0].clientY; 
        },
        OnDocumentTouchEnd: function () { this.ifMouseDown = false; },
        OnDocumentTouchMove: function (event) {
          if (this.ifMouseDown) {
            let temp_x = event.touches[0].clientX - this.x_cord;
            let temp_y = event.touches[0].clientY - this.y_cord;
            this.el.object3D.rotation.y += temp_x * this.data.speed / 100;
            this.el.object3D.rotation.x += temp_y * this.data.speed / 100;
            this.x_cord = event.touches[0].clientX;
            this.y_cord = event.touches[0].clientY;
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="lab-kit" src="./assets/titration_final.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

      <a-entity light="type: directional; intensity: 0.8;" position="1 1 1"></a-entity>
      <a-entity light="type: ambient; intensity: 0.5;"></a-entity>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-entity drag-rotate>
            
            <a-gltf-model id="titration-setup" 
                          src="#lab-kit" 
                          scale="0.5 0.5 0.5" 
                          position="0 -0.5 0">
            </a-gltf-model>

            <a-box id="interaction-hitbox" 
                   class="clickable" 
                   scale="2 3 2" 
                   position="0 0.5 0" 
                   color="red"
                   material="opacity: 0.4; transparent: true">
            </a-box>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const setup = document.querySelector('#titration-setup');
      const hitbox = document.querySelector('#interaction-hitbox');
      let dropCount = 0;
      let isAnimating = false;

      // STEP A: Hide the Pink Liquid the moment the 3D model loads
      setup.addEventListener('model-loaded', () => {
         const mesh = setup.getObject3D('mesh');
         if (mesh) {
             const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
             if (pinkLiquid) pinkLiquid.visible = false; 
         }
      });

      // STEP B: The Click Event
      hitbox.addEventListener('click', () => {
        if (isAnimating) return; // Prevent spam-clicking while the drop is falling
        
        dropCount++;
        isAnimating = true;

        // STEP C: Play the Blender Animation Exactly Once
        // We remove the attribute first to "reset" it so it can play again on the next click
        setup.removeAttribute('animation-mixer');
        setTimeout(() => {
            setup.setAttribute('animation-mixer', 'clip: *; loop: once; crossFadeDuration: 0;');
        }, 10);

        // STEP D: Wait for the 20-frame Blender animation to finish
        setup.addEventListener('animation-finished', function handler() {
          setup.removeEventListener('animation-finished', handler); // Clean up the listener
          isAnimating = false; // Unlock clicking for the next drop

          // STEP E: The 7-Click Color Swap Logic
          if (dropCount === 7) {
            const mesh = setup.getObject3D('mesh');
            if (!mesh) return;

            const clearLiquid = mesh.getObjectByName('Liquid_Clear');
            const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
            
            // The Instant Chemical Reaction
            if (clearLiquid) clearLiquid.visible = false; 
            if (pinkLiquid) pinkLiquid.visible = true;    
            
            // The Screen Popup
            const alertBox = document.createElement('div');
            alertBox.innerHTML = "Equivalence Point Reached!";
            alertBox.style.cssText = "position:absolute; top:15%; left:50%; transform:translateX(-50%); background:white; padding:15px; border-radius:10px; font-family:sans-serif; font-weight:bold; color:#FF1493; z-index:999; box-shadow: 0px 4px 6px rgba(0,0,0,0.3); text-align: center;";
            document.body.appendChild(alertBox);
            setTimeout(() => alertBox.remove(), 4000); // Disappears after 4 seconds
          }
        });
      });
    </script>
  </body>
</html>
