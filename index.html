<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Titration Final Project</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
      .mindar-ui-overlay { pointer-events: none; }
      #debug-ui {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.8); color: lime; padding: 10px 20px; border-radius: 8px;
        font-family: monospace; font-size: 16px; z-index: 9999; display: none; pointer-events: none; text-align: center;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <div id="debug-ui">System Ready</div>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true, antialias: true, sortObjects: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="lab-kit" src="./assets/titration_final.glb"></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; intensity: 1.2; color: #ffffff;"></a-entity>
      <a-entity light="type: directional; intensity: 1.5; color: #ffffff;" position="1 2 1"></a-entity>
      <a-entity light="type: directional; intensity: 0.5; color: #e0f7fa;" position="-1 0.5 -1"></a-entity>

      <a-camera id="ar-camera" position="0 0 0" look-controls="enabled: false">
          <a-entity id="hud-model" visible="false" position="0 -0.5 -3">
              <a-gltf-model class="titration-setup" src="#lab-kit" scale="0.5 0.5 0.5" position="0 0 0"></a-gltf-model>
          </a-entity>
      </a-camera>

      <a-entity id="image-target" mindar-image-target="targetIndex: 0">
          <a-entity id="target-model" visible="false" position="0 -0.5 0">
              <a-gltf-model class="titration-setup" src="#lab-kit" scale="0.5 0.5 0.5" position="0 0 0"></a-gltf-model>
          </a-entity>
      </a-entity>

    </a-scene>

    <script>
      const models = document.querySelectorAll('.titration-setup');
      const hudWrapper = document.querySelector('#hud-model');
      const targetWrapper = document.querySelector('#target-model');
      const targetEntity = document.querySelector('#image-target');
      
      let dropCount = 0;
      let isAnimating = false;
      let hasBeenScannedOnce = false;

      function showDebug(msg) {
          const debugUI = document.querySelector('#debug-ui');
          debugUI.style.display = 'block';
          debugUI.innerText = msg;
          setTimeout(() => { debugUI.style.display = 'none'; }, 3000);
      }

      // 1. SHADER FIXES (Applies to both models so they are perfectly identical)
      models.forEach(setup => {
          setup.addEventListener('model-loaded', () => {
             const mesh = setup.getObject3D('mesh');
             if (mesh) {
                 mesh.traverse((node) => {
                     if (node.isMesh && node.material) {
                         if (node.name.includes('Liquid') || node.name.includes('Sphere')) {
                             node.material.transparent = false;
                             node.material.opacity = 1.0;
                             node.material.depthWrite = true;
                             node.material.renderOrder = 1;
                             if (node.material.transmission !== undefined) node.material.transmission = 0;
                             node.material.needsUpdate = true; 
                         }
                         else if (node.material.transparent || node.material.opacity < 1.0) {
                             node.material.depthWrite = false;
                             node.material.renderOrder = 2;
                             node.material.needsUpdate = true;
                         }
                     }
                 });
                 const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
                 if (pinkLiquid) pinkLiquid.visible = false; 
             }
          });
      });

      // 2. THE ILLUSION (Swapping visibility instantly)
      targetEntity.addEventListener('targetFound', () => {
          hasBeenScannedOnce = true;
          targetWrapper.setAttribute('visible', true);
          hudWrapper.setAttribute('visible', false);
          showDebug("Locked to Paper!");
      });

      targetEntity.addEventListener('targetLost', () => {
          if (hasBeenScannedOnce) {
              targetWrapper.setAttribute('visible', false);
              hudWrapper.setAttribute('visible', true);
              showDebug("Locked to Screen!");
          }
      });

      // 3. GLOBAL TOUCH CONTROLS (Applies rotation and zoom to BOTH wrappers simultaneously)
      let isDragging = false;
      let lastX = 0, lastY = 0;
      let initialDist = 0;
      let currentScale = 1; 

      function getDist(touches) {
          let dx = touches[0].clientX - touches[1].clientX;
          let dy = touches[0].clientY - touches[1].clientY;
          return Math.sqrt(dx*dx + dy*dy);
      }

      window.addEventListener('touchstart', (e) => {
          if (e.touches.length === 1) {
              isDragging = true;
              lastX = e.touches[0].clientX;
              lastY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
              isDragging = false;
              initialDist = getDist(e.touches);
          }
      });

      window.addEventListener('touchend', () => { isDragging = false; });

      window.addEventListener('touchmove', (e) => {
          // ROTATE
          if (isDragging && e.touches.length === 1) {
              let deltaX = e.touches[0].clientX - lastX;
              let deltaY = e.touches[0].clientY - lastY;
              
              [hudWrapper, targetWrapper].forEach(el => {
                  el.object3D.rotation.y += deltaX * 0.01;
                  el.object3D.rotation.x += deltaY * 0.01;
              });

              lastX = e.touches[0].clientX;
              lastY = e.touches[0].clientY;
          } 
          // ZOOM
          else if (e.touches.length === 2 && initialDist > 0) {
              let currentDist = getDist(e.touches);
              let scaleFactor = currentDist / initialDist;
              let newScale = currentScale * scaleFactor;
              
              newScale = Math.max(0.5, Math.min(3, newScale)); // Limits zoom size
              
              [hudWrapper, targetWrapper].forEach(el => {
                  el.object3D.scale.set(newScale, newScale, newScale);
              });
              
              currentScale = newScale;
              initialDist = currentDist; // Reset for smooth continuous zoom
          }
      });

      // 4. TAP TO ANIMATE (Fires on both models simultaneously)
      window.addEventListener('click', () => {
        if (isAnimating || !hasBeenScannedOnce) return; 
        
        dropCount++;
        isAnimating = true;

        models.forEach(setup => {
            setup.removeAttribute('animation-mixer');
            setTimeout(() => {
                setup.setAttribute('animation-mixer', 'clip: *; loop: once; crossFadeDuration: 0;');
            }, 10);
        });

        const onAnimationFinish = function() {
          models[0].removeEventListener('animation-finished', onAnimationFinish);
          isAnimating = false; 

          if (dropCount === 7) {
              models.forEach(setup => {
                  const mesh = setup.getObject3D('mesh');
                  if (mesh) {
                      const clearLiquid = mesh.getObjectByName('Liquid_Clear');
                      const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
                      if (clearLiquid) clearLiquid.visible = false; 
                      if (pinkLiquid) pinkLiquid.visible = true;    
                  }
              });
            
              const alertBox = document.createElement('div');
              alertBox.innerHTML = "Equivalence Point Reached!";
              alertBox.style.cssText = "position:absolute; top:20%; left:50%; transform:translateX(-50%); background:white; padding:15px; border-radius:10px; font-family:sans-serif; font-weight:bold; color:#FF1493; z-index:9999; box-shadow: 0px 4px 6px rgba(0,0,0,0.4); text-align: center;";
              document.body.appendChild(alertBox);
              setTimeout(() => alertBox.remove(), 4000);
          }
        };

        models[0].addEventListener('animation-finished', onAnimationFinish);
        
        setTimeout(() => {
            if (isAnimating) {
                isAnimating = false;
                models[0].removeEventListener('animation-finished', onAnimationFinish);
            }
        }, 1500); 
      });
    </script>
  </body>
</html>
