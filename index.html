<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Universal AR Scanner</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; }
      .mindar-ui-overlay { pointer-events: none; }
      
      /* The Main Menu Overlay */
      #ar-menu {
        position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%);
        width: 90%; max-width: 400px; background: rgba(20, 20, 25, 0.85);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 24px 24px 0 0;
        padding: 30px 20px 40px 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        z-index: 9999; transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        text-align: center; pointer-events: auto;
      }
      #ar-menu.visible { bottom: 0; }
      #ar-menu h2 { color: #ffffff; margin: 0 0 5px 0; font-size: 24px; font-weight: 600; }
      #ar-menu p { color: #aaaaaa; margin: 0 0 25px 0; font-size: 14px; }

      /* The Menu Buttons */
      .menu-btn {
        display: flex; align-items: center; justify-content: center; width: 100%;
        background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 18px; margin-bottom: 15px; border-radius: 16px; font-size: 16px; font-weight: 500;
        cursor: pointer; transition: all 0.2s ease;
      }
      .menu-btn:hover, .menu-btn:active {
        background: rgba(255, 20, 147, 0.3); border-color: rgba(255, 20, 147, 0.6); transform: scale(0.98);
      }
      .menu-btn .icon { font-size: 24px; margin-right: 12px; }

      /* The Back Button */
      #back-btn {
        position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px); color: white; border: 1px solid rgba(255,255,255,0.2);
        padding: 10px 15px; border-radius: 30px; font-weight: bold; z-index: 9999;
        cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
      }
      #back-btn.visible { opacity: 1; pointer-events: auto; }

      /* HUMAN ANATOMY SUB-MENU (Floating Pill) */
      #human-sub-menu {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 8px; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        padding: 12px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2);
        flex-wrap: nowrap; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        width: max-content; max-width: 95%; overflow-x: auto;
      }
      #human-sub-menu.visible { opacity: 1; pointer-events: auto; }
      .sub-btn {
        background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 10px 15px; border-radius: 20px; font-size: 13px; font-weight: bold;
        cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
      }
      .sub-btn.active, .sub-btn:hover { background: rgba(255, 20, 147, 0.6); border-color: rgba(255, 20, 147, 1); }
      
      /* Titration Success Popup */
      #success-popup {
        position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
        background: white; padding: 15px 25px; border-radius: 30px;
        font-family: sans-serif; font-weight: bold; color: #FF1493;
        z-index: 9999; box-shadow: 0px 8px 15px rgba(0,0,0,0.3);
        opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
      }
      #success-popup.visible { opacity: 1; }
    </style>
  </head>

  <body>
    <button id="back-btn">← Menu</button>
    <div id="success-popup">Equivalence Point Reached! pH = 7.0</div>
    
    <div id="human-sub-menu">
        <button class="sub-btn active" id="btn-angio">Angiology</button>
        <button class="sub-btn" id="btn-muscle">Muscular System</button>
        <button class="sub-btn" id="btn-splanchno">Splanchnology</button>
    </div>
    
    <div id="ar-menu">
      <h2 id="menu-title">Lab Environment</h2>
      <p>Target Scanned! Choose your experience.</p>
      <button class="menu-btn" id="btn-3d">
          <span class="icon" id="icon-3d">🧪</span> <span id="text-3d">Interactive 3D Model</span>
      </button>
      <button class="menu-btn" id="btn-video">
          <span class="icon" id="icon-vid">▶️</span> <span id="text-vid">Watch Explanation Video</span>
      </button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.001;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true, antialias: true, sortObjects: true" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets timeout="8000">
        <a-asset-item id="titration-model" src="./assets/titration_final.glb"></a-asset-item>
        <video id="titration-vid" src="./assets/titration_video.mp4" preload="none" crossorigin="anonymous" loop="true" playsinline webkit-playsinline></video>
        
        <a-asset-item id="solar-model" src="./assets/solar_system_animation.glb"></a-asset-item>
        <video id="solar-vid" src="./assets/solar_video.mp4" preload="none" crossorigin="anonymous" loop="true" playsinline webkit-playsinline></video>

        <a-asset-item id="human-angio" src="./assets/angiology.glb"></a-asset-item>
        <a-asset-item id="human-muscle" src="./assets/muscular_insertions.glb"></a-asset-item>
        <a-asset-item id="human-splanchno" src="./assets/splanchnology.glb"></a-asset-item>
        <video id="human-vid" src="./assets/human_video.mp4" preload="none" crossorigin="anonymous" loop="true" playsinline webkit-playsinline></video>

        <a-asset-item id="flower-model" src="./assets/anatomy_of_a_flower.glb"></a-asset-item>
        <video id="flower-vid" src="./assets/flower_video.mp4" preload="none" crossorigin="anonymous" loop="true" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity light="type: ambient; intensity: 1.2; color: #ffffff;"></a-entity>
      <a-entity light="type: directional; intensity: 1.5; color: #ffffff;" position="1 2 1"></a-entity>
      <a-entity light="type: directional; intensity: 0.5; color: #e0f7fa;" position="-1 0.5 -1"></a-entity>

      <a-entity id="target-titration" mindar-image-target="targetIndex: 0">
          <a-entity id="wrapper-titration" visible="false" position="0 -0.5 0">
              <a-gltf-model id="setup-titration" src="#titration-model" scale="0.5 0.5 0.5" position="0 0 0"></a-gltf-model>
              <a-entity position="0.5 1.2 0">
                  <a-text value="Burette (Titrant)" color="white" width="4" align="left"></a-text>
                  <a-text value="Sodium Hydroxide (NaOH)" color="#FF1493" position="0 -0.15 0" width="3" align="left"></a-text>
              </a-entity>
              <a-entity position="0.5 0.2 0">
                  <a-text value="Flask (Analyte)" color="white" width="4" align="left"></a-text>
                  <a-text id="liquid-text" value="HCl + Phenolphthalein" color="#00BFFF" position="0 -0.15 0" width="3.5" align="left"></a-text>
              </a-entity>
          </a-entity>
          <a-video id="ar-vid-titration" src="#titration-vid" position="0 0 0" scale="1 0.56 1" visible="false"></a-video>
      </a-entity>

      <a-entity id="target-solar" mindar-image-target="targetIndex: 1">
          <a-entity id="wrapper-solar" visible="false" position="0 0 0">
              <a-gltf-model id="setup-solar" src="#solar-model" scale="0.02 0.02 0.02" position="0 0 0" animation-mixer></a-gltf-model>
          </a-entity>
          <a-video id="ar-vid-solar" src="#solar-vid" position="0 0 0" scale="1 0.56 1" visible="false"></a-video>
      </a-entity>

      <a-entity id="target-human" mindar-image-target="targetIndex: 2">
          <a-entity id="wrapper-human" visible="false" position="0 0 0">
              <a-gltf-model id="model-angio" src="#human-angio" scale="0.15 0.15 0.15" position="0 0 0" visible="true" animation-mixer></a-gltf-model>
              <a-gltf-model id="model-muscle" src="#human-muscle" scale="0.15 0.15 0.15" position="0 0 0" visible="false" animation-mixer></a-gltf-model>
              <a-gltf-model id="model-splanchno" src="#human-splanchno" scale="0.15 0.15 0.15" position="0 0 0" visible="false" animation-mixer></a-gltf-model>
          </a-entity>
          <a-video id="ar-vid-human" src="#human-vid" position="0 0 0" scale="1 0.56 1" visible="false"></a-video>
      </a-entity>

      <a-entity id="target-flower" mindar-image-target="targetIndex: 3">
          <a-entity id="wrapper-flower" visible="false" position="0 0 0">
              <a-gltf-model id="setup-flower" src="#flower-model" scale="0.2 0.2 0.2" position="0 0 0" animation-mixer></a-gltf-model>
          </a-entity>
          <a-video id="ar-vid-flower" src="#flower-vid" position="0 0 0" scale="1 0.56 1" visible="false"></a-video>
      </a-entity>

    </a-scene>

    <script>
      // DOM Elements
      const arMenu = document.getElementById('ar-menu');
      const backBtn = document.getElementById('back-btn');
      const popup = document.getElementById('success-popup');
      
      const btn3D = document.getElementById('btn-3d');
      const btnVideo = document.getElementById('btn-video');
      
      // Dynamic Menu Text Elements
      const menuTitle = document.getElementById('menu-title');
      const icon3D = document.getElementById('icon-3d');
      const iconVid = document.getElementById('icon-vid');
      const text3D = document.getElementById('text-3d');
      const textVid = document.getElementById('text-vid');

      // Human Sub-Menu Elements
      const humanSubMenu = document.getElementById('human-sub-menu');
      const btnAngio = document.getElementById('btn-angio');
      const btnMuscle = document.getElementById('btn-muscle');
      const btnSplanchno = document.getElementById('btn-splanchno');

      // Targets
      const targetTitration = document.querySelector('#target-titration');
      const targetSolar = document.querySelector('#target-solar');
      const targetHuman = document.querySelector('#target-human');
      const targetFlower = document.querySelector('#target-flower');
      
      // Wrappers
      const wrapTitration = document.querySelector('#wrapper-titration');
      const wrapSolar = document.querySelector('#wrapper-solar');
      const wrapHuman = document.querySelector('#wrapper-human');
      const wrapFlower = document.querySelector('#wrapper-flower');
      
      // Models & Videos
      const setupTitration = document.querySelector('#setup-titration');
      const modelAngio = document.querySelector('#model-angio');
      const modelMuscle = document.querySelector('#model-muscle');
      const modelSplanchno = document.querySelector('#model-splanchno');
      const liquidText = document.querySelector('#liquid-text');
      
      const vidTitrationEnt = document.querySelector('#ar-vid-titration');
      const vidSolarEnt = document.querySelector('#ar-vid-solar');
      const vidHumanEnt = document.querySelector('#ar-vid-human');
      const vidFlowerEnt = document.querySelector('#ar-vid-flower');

      const vidAssetTitration = document.querySelector('#titration-vid');
      const vidAssetSolar = document.querySelector('#solar-vid');
      const vidAssetHuman = document.querySelector('#human-vid');
      const vidAssetFlower = document.querySelector('#flower-vid');

      // State Variables
      let activeTarget = null; 
      let activeExperience = null; 
      let activeWrapper = null; 
      
      // Titration Variables
      let dropCount = 0;
      let isAnimating = false;

      // 1. TITRATION SHADER FIXES
      setupTitration.addEventListener('model-loaded', () => {
         const mesh = setupTitration.getObject3D('mesh');
         if (mesh) {
             mesh.traverse((node) => {
                 if (node.isMesh && node.material) {
                     if (node.name.includes('Liquid') || node.name.includes('Sphere')) {
                         node.material.transparent = false;
                         node.material.opacity = 1.0;
                         node.material.depthWrite = true;
                         node.material.renderOrder = 1;
                         if (node.material.transmission !== undefined) node.material.transmission = 0;
                         node.material.needsUpdate = true; 
                     } else if (node.material.transparent || node.material.opacity < 1.0) {
                         node.material.depthWrite = false;
                         node.material.renderOrder = 2;
                         node.material.needsUpdate = true;
                     }
                 }
             });
             const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
             if (pinkLiquid) pinkLiquid.visible = false; 
         }
      });

      // 2. SCANNING LOGIC 
      targetTitration.addEventListener('targetFound', () => {
          activeTarget = 'titration';
          menuTitle.innerText = "Titration Lab";
          icon3D.innerText = "🧪"; iconVid.innerText = "▶️";
          text3D.innerText = "Interactive Titration"; textVid.innerText = "Watch Chemistry Video";

          if (!activeExperience) { arMenu.classList.add('visible'); } 
          else if (activeExperience === '3d') { wrapTitration.setAttribute('visible', true); activeWrapper = wrapTitration; } 
          else if (activeExperience === 'video') { vidTitrationEnt.setAttribute('visible', true); vidAssetTitration.play(); }
      });

      targetSolar.addEventListener('targetFound', () => {
          activeTarget = 'solar';
          menuTitle.innerText = "The Solar System";
          icon3D.innerText = "🪐"; iconVid.innerText = "🌌";
          text3D.innerText = "Interactive Galaxy"; textVid.innerText = "Watch Planetary Video";

          if (!activeExperience) { arMenu.classList.add('visible'); } 
          else if (activeExperience === '3d') { wrapSolar.setAttribute('visible', true); activeWrapper = wrapSolar; } 
          else if (activeExperience === 'video') { vidSolarEnt.setAttribute('visible', true); vidAssetSolar.play(); }
      });

      targetHuman.addEventListener('targetFound', () => {
          activeTarget = 'human';
          menuTitle.innerText = "Human Anatomy";
          icon3D.innerText = "🫀"; iconVid.innerText = "🎬";
          text3D.innerText = "Interactive 3D Systems"; textVid.innerText = "Watch Anatomy Video";

          if (!activeExperience) { arMenu.classList.add('visible'); } 
          else if (activeExperience === '3d') { 
              wrapHuman.setAttribute('visible', true); activeWrapper = wrapHuman; 
              humanSubMenu.classList.add('visible'); 
          } 
          else if (activeExperience === 'video') { vidHumanEnt.setAttribute('visible', true); vidAssetHuman.play(); }
      });

      targetFlower.addEventListener('targetFound', () => {
          activeTarget = 'flower';
          menuTitle.innerText = "Flower Anatomy";
          icon3D.innerText = "🌸"; iconVid.innerText = "🎥";
          text3D.innerText = "Interactive Botany"; textVid.innerText = "Watch Flower Video";

          if (!activeExperience) { arMenu.classList.add('visible'); } 
          else if (activeExperience === '3d') { wrapFlower.setAttribute('visible', true); activeWrapper = wrapFlower; } 
          else if (activeExperience === 'video') { vidFlowerEnt.setAttribute('visible', true); vidAssetFlower.play(); }
      });

      // Handle Target Loss
      const handleTargetLost = () => {
          activeTarget = null;
          activeWrapper = null;
          arMenu.classList.remove('visible');
          humanSubMenu.classList.remove('visible');
          
          vidAssetTitration.pause();
          vidAssetSolar.pause();
          vidAssetHuman.pause();
          vidAssetFlower.pause();
      };
      targetTitration.addEventListener('targetLost', handleTargetLost);
      targetSolar.addEventListener('targetLost', handleTargetLost);
      targetHuman.addEventListener('targetLost', handleTargetLost);
      targetFlower.addEventListener('targetLost', handleTargetLost);

      // 3. UI BUTTON CLICKS
      btn3D.addEventListener('click', () => {
          activeExperience = '3d';
          arMenu.classList.remove('visible');
          backBtn.classList.add('visible');
          
          if (activeTarget === 'titration') { wrapTitration.setAttribute('visible', true); activeWrapper = wrapTitration; } 
          else if (activeTarget === 'solar') { wrapSolar.setAttribute('visible', true); activeWrapper = wrapSolar; }
          else if (activeTarget === 'human') { wrapHuman.setAttribute('visible', true); activeWrapper = wrapHuman; humanSubMenu.classList.add('visible'); }
          else if (activeTarget === 'flower') { wrapFlower.setAttribute('visible', true); activeWrapper = wrapFlower; }
      });

      btnVideo.addEventListener('click', () => {
          activeExperience = 'video';
          arMenu.classList.remove('visible');
          backBtn.classList.add('visible');
          
          if (activeTarget === 'titration') { vidTitrationEnt.setAttribute('visible', true); vidAssetTitration.play(); } 
          else if (activeTarget === 'solar') { vidSolarEnt.setAttribute('visible', true); vidAssetSolar.play(); }
          else if (activeTarget === 'human') { vidHumanEnt.setAttribute('visible', true); vidAssetHuman.play(); }
          else if (activeTarget === 'flower') { vidFlowerEnt.setAttribute('visible', true); vidAssetFlower.play(); }
      });

      // Human Anatomy Sub-Menu Logic (Instant Visibility Swap)
      function switchHumanModel(activeModelEnt, activeBtn) {
          modelAngio.setAttribute('visible', false);
          modelMuscle.setAttribute('visible', false);
          modelSplanchno.setAttribute('visible', false);
          
          activeModelEnt.setAttribute('visible', true);
          
          [btnAngio, btnMuscle, btnSplanchno].forEach(b => b.classList.remove('active'));
          activeBtn.classList.add('active');
      }
      btnAngio.addEventListener('click', () => switchHumanModel(modelAngio, btnAngio));
      btnMuscle.addEventListener('click', () => switchHumanModel(modelMuscle, btnMuscle));
      btnSplanchno.addEventListener('click', () => switchHumanModel(modelSplanchno, btnSplanchno));

      // Back to Menu Button
      backBtn.addEventListener('click', () => {
          activeExperience = null;
          activeWrapper = null;
          backBtn.classList.remove('visible');
          humanSubMenu.classList.remove('visible');
          
          wrapTitration.setAttribute('visible', false);
          wrapSolar.setAttribute('visible', false);
          wrapHuman.setAttribute('visible', false);
          wrapFlower.setAttribute('visible', false);
          
          vidTitrationEnt.setAttribute('visible', false);
          vidSolarEnt.setAttribute('visible', false);
          vidHumanEnt.setAttribute('visible', false);
          vidFlowerEnt.setAttribute('visible', false);
          
          vidAssetTitration.pause(); vidAssetSolar.pause(); vidAssetHuman.pause(); vidAssetFlower.pause();
          vidAssetTitration.currentTime = 0; vidAssetSolar.currentTime = 0; vidAssetHuman.currentTime = 0; vidAssetFlower.currentTime = 0;
          
          dropCount = 0;
          const mesh = setupTitration.getObject3D('mesh');
          if (mesh) {
              const clearLiquid = mesh.getObjectByName('Liquid_Clear');
              const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
              if (clearLiquid) clearLiquid.visible = true; 
              if (pinkLiquid) pinkLiquid.visible = false;   
          }
          liquidText.setAttribute('value', 'HCl + Phenolphthalein');
          liquidText.setAttribute('color', '#00BFFF');

          if (activeTarget) arMenu.classList.add('visible');
      });

      // 4. UNIVERSAL TOUCH CONTROLS
      let isDragging = false;
      let lastX = 0, lastY = 0;
      let initialDist = 0;
      let currentScale = 1; 

      function getDist(touches) {
          let dx = touches[0].clientX - touches[1].clientX;
          let dy = touches[0].clientY - touches[1].clientY;
          return Math.sqrt(dx*dx + dy*dy);
      }

      window.addEventListener('touchstart', (e) => {
          if (activeExperience !== '3d' || !activeWrapper) return; 
          
          if (e.touches.length === 1 && e.target.tagName !== 'BUTTON') {
              isDragging = true;
              lastX = e.touches[0].clientX;
              lastY = e.touches[0].clientY;
          } else if (e.touches.length === 2) {
              isDragging = false;
              initialDist = getDist(e.touches);
              currentScale = activeWrapper.object3D.scale.x;
          }
      });

      window.addEventListener('touchend', () => { isDragging = false; });

      window.addEventListener('touchmove', (e) => {
          if (activeExperience !== '3d' || !activeWrapper) return;

          if (isDragging && e.touches.length === 1) {
              let deltaX = e.touches[0].clientX - lastX;
              let deltaY = e.touches[0].clientY - lastY;
              
              activeWrapper.object3D.rotation.y += deltaX * 0.01;
              activeWrapper.object3D.rotation.x += deltaY * 0.01;
              
              lastX = e.touches[0].clientX;
              lastY = e.touches[0].clientY;
          } else if (e.touches.length === 2 && initialDist > 0) {
              let currentDist = getDist(e.touches);
              let scaleFactor = currentDist / initialDist;
              let newScale = currentScale * scaleFactor;
              newScale = Math.max(0.05, Math.min(4, newScale)); 
              
              activeWrapper.object3D.scale.set(newScale, newScale, newScale);
          }
      });

      // 5. TITRATION TAP-TO-ANIMATE
      window.addEventListener('click', (e) => {
        if (activeTarget !== 'titration' || activeExperience !== '3d' || isAnimating || e.target.tagName === 'BUTTON') return; 
        
        dropCount++;
        isAnimating = true;

        setupTitration.removeAttribute('animation-mixer');
        setTimeout(() => {
            setupTitration.setAttribute('animation-mixer', 'clip: *; loop: once; crossFadeDuration: 0;');
        }, 10);

        const onAnimationFinish = function() {
          setupTitration.removeEventListener('animation-finished', onAnimationFinish);
          isAnimating = false; 

          if (dropCount === 7) {
              const mesh = setupTitration.getObject3D('mesh');
              if (mesh) {
                  const clearLiquid = mesh.getObjectByName('Liquid_Clear');
                  const pinkLiquid = mesh.getObjectByName('Liquid_Pink');
                  if (clearLiquid) clearLiquid.visible = false; 
                  if (pinkLiquid) pinkLiquid.visible = true;    
              }

              liquidText.setAttribute('value', 'Neutralized: NaCl + H2O');
              liquidText.setAttribute('color', '#FF1493');
            
              popup.classList.add('visible');
              setTimeout(() => popup.classList.remove('visible'), 4000);
          }
        };

        setupTitration.addEventListener('animation-finished', onAnimationFinish);
        setTimeout(() => {
            if (isAnimating) {
                isAnimating = false;
                setupTitration.removeEventListener('animation-finished', onAnimationFinish);
            }
        }, 1500); 
      });
    </script>
  </body>
</html>
